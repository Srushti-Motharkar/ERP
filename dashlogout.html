<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);   
        }
        h1 { color: #28a745; }
        a { 
            color: #764ba2; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Dashboard</h1>
        <p>You have successfully logged in!</p>
        <a href="index.html">Logout</a>
    </div>
</body>
</html>
