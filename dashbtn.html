<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions Dashboard</title>
    <!-- Importing a nice font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --btn-shadow: 0 4px 15px rgba(0,0,0,0.2);
            --dropdown-bg: rgba(255, 255, 255, 0.9);
            --dropdown-text: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--primary-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite linear;
            z-index: 0;
        }
        .circle:nth-child(1) { width: 300px; height: 300px; top: -50px; left: -50px; }
        .circle:nth-child(2) { width: 200px; height: 200px; bottom: 50px; right: -50px; animation-duration: 25s; }
        .circle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 20%; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 40px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .dashboard-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            width: 90%;
            max-width: 450px;
            z-index: 10;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 2.5rem;
            font-weight: 700;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* --- Dropdown Styles --- */
        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        

       

        

        /* --- Button Styles --- */
        .btn {
            padding: 16px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-weight: 600;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--btn-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        /* Button Specific Styles */
        .btn-student {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-client {
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #555; /* Darker text for light background */
        }

        .btn-dash {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-logout {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            padding: 12px 20px;
        }

        /* Hover Effects */
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Shine effect on hover */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .dashboard-container {
                padding: 2rem;
            }
            h1 { font-size: 1.5rem; }
            .btn { font-size: 1rem; padding: 14px; }
        }
    </style>
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="dashboard-container">
        <h1>PSK ERP Management Portal💻</h1>  
        <div class="button-group">
            
           

            <button class="btn btn-dash" onclick="openDash()">
                <span>📊</span> View Dashboard
            </button>
        </div>
        <button class="btn btn-logout" onclick="logout()">
            <span>🚪</span> Logout
        </button>
    </div>

    <script>
       

        // Dashboard & Logout
        function openDash() {
            window.location.href = "dash.html";
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('rememberedUser');
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
